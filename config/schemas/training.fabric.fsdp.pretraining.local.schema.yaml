# Schema for pretraining with FSDP using local datasets
# This schema extends the base pretraining FSDP schema

$schema: http://json-schema.org/draft-07/schema#
title: Pretraining FSDP Local Dataset Configuration
description: Configuration schema for pretraining with FSDP using local datasets
type: object

allOf:
  - $ref: training.fabric.fsdp.pretraining.schema.yaml
  - type: object
    properties:
      dataset:
        type: object
        description: Dataset configuration for pretraining with local datasets
        required:
          - source
          - nameOrPath
          - format
        properties:
          source:
            type: string
            enum: [local]
            description: Source of the dataset, must be 'local'
          
          nameOrPath:
            type: string
            description: Path to the local dataset
          
          format:
            type: string
            enum: [dataset, files]
            description: Format of the dataset (dataset or files)
          
          use_txt_as_samples:
            type: boolean
            description: Whether to use each text file as a separate sample
            default: false
          
          file_config:
            type: object
            description: Configuration for file-based datasets
            properties:
              extension:
                type: string
                description: File extension to filter
                default: .txt
              
              recursive:
                type: boolean
                description: Whether to search recursively
                default: true
              
              min_file_size:
                type: integer
                description: Minimum file size in bytes
                default: 0
              
              max_file_size:
                type: integer
                description: Maximum file size in bytes
                default: 1000000000  # 1GB
              
              encoding:
                type: string
                description: Text encoding for files
                default: utf-8
              
              chunk_size:
                type: integer
                description: Size of text chunks for preprocessing
                default: 2048
              
              stride:
                type: integer
                description: Stride for text chunking
                default: 512
              
              add_eos_token:
                type: boolean
                description: Whether to add EOS token to each chunk
                default: true
          
          filter:
            type: object
            description: Filtering options for the dataset
            properties:
              min_length:
                type: integer
                description: Minimum sequence length
                default: 10
              
              max_length:
                type: integer
                description: Maximum sequence length
                default: 2048
