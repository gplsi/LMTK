$schema: "http://json-schema.org/draft-07/schema#"
$id: "instruction.json.schema.yaml"
description: "Schema for JSON/JSONL dataset configuration in instruction tasks"

type: object
properties:
  source:
    type: string
    enum: ["local"]
    description: "Specifies that the dataset source is local"
  
  nameOrPath:
    type: string
    description: "Path to the JSON/JSONL file or directory containing JSON/JSONL files"
  
  format:
    type: string
    enum: ["json", "jsonl"]
    description: "Format of the local dataset files"
  
  file_config:
    type: object
    properties:
      encoding:
        type: string
        default: "utf-8"
        description: "Character encoding of the files"
      
      lines:
        type: boolean
        default: true
        description: "Whether each line is a separate JSON object (for JSONL)"
      
      orient:
        type: string
        enum: ["records", "split", "index", "columns", "values"]
        default: "records"
        description: "Expected JSON structure for pandas reading (for JSON)"
      
      nested_keys:
        type: array
        items:
          type: string
        description: "List of keys to navigate nested JSON structures"
      
      flatten:
        type: boolean
        default: false
        description: "Whether to flatten nested JSON structures"
    
    required:
      - encoding
  
  recursive:
    type: boolean
    default: false
    description: "Whether to recursively search for JSON/JSONL files in subdirectories"
  
  pattern:
    type: string
    default: "*.json*"
    description: "File pattern to match when loading multiple files"
  
  max_files:
    type: integer
    description: "Maximum number of files to process"
  
  sample_files:
    type: boolean
    default: false
    description: "Whether to randomly sample files instead of taking the first N"
  
  splits:
    type: object
    description: "Configuration for dataset splits from JSON files"
    properties:
      train_files:
        type: array
        items:
          type: string
        description: "List of file paths or patterns for training data"
      
      validation_files:
        type: array
        items:
          type: string
        description: "List of file paths or patterns for validation data"
      
      test_files:
        type: array
        items:
          type: string
        description: "List of file paths or patterns for test data"
      
      split_by_file:
        type: boolean
        default: false
        description: "Whether to create splits based on file grouping"
      
      split_by_field:
        type: string
        description: "Field in the JSON data that indicates which split the example belongs to"
      
      train_value:
        type: string
        default: "train"
        description: "Value of split_by_field that indicates training examples"
      
      validation_value:
        type: string
        default: "validation"
        description: "Value of split_by_field that indicates validation examples"
      
      test_value:
        type: string
        default: "test"
        description: "Value of split_by_field that indicates test examples"
  
  max_samples:
    type: object
    description: "Maximum number of samples to load per split"
    properties:
      train:
        type: integer
        description: "Maximum number of samples to load from the training split"
      validation:
        type: integer
        description: "Maximum number of samples to load from the validation split"
      test:
        type: integer
        description: "Maximum number of samples to load from the test split"
      all:
        type: integer
        description: "Maximum number of samples to load from any split if not specified individually"
  
  auto_split:
    type: boolean
    default: false
    description: "Whether to automatically split the dataset if no validation/test splits are provided"

required:
  - source
  - nameOrPath
  - format
