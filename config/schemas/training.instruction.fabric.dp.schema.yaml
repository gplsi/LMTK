$schema: http://json-schema.org/draft-07/schema#
$id: training.instruction.fabric.dp.schema.yaml
title: Instruction DataParallel Strategy Configuration
description: Schema for DataParallel strategy configuration for instruction fine-tuning

type: object
allOf:
  - $ref: training.instruction.fabric.schema.yaml

properties:
  # Strategy must be dp
  strategy:
    type: string
    enum: [dp]
    default: dp
    description: Strategy type, must be 'dp'
  
  # DataParallel-specific configurations
  dp:
    type: object
    properties:
      sync_batch_norm:
        type: boolean
        default: false
        description: Whether to use synchronized batch normalization
      
      find_unused_parameters:
        type: boolean
        default: false
        description: Whether to find unused parameters
      
      broadcast_buffers:
        type: boolean
        default: true
        description: Whether to broadcast buffers
      
      bucket_cap_mb:
        type: number
        default: 25
        description: Bucket capacity in MB
    additionalProperties: false

additionalProperties: false
