$schema: http://json-schema.org/draft-07/schema#
$id: training.pretraining.fabric.dataparallel.schema.yaml
title: Pretraining DataParallel Strategy Configuration
description: Schema for DataParallel strategy configuration for pretraining

type: object
allOf:
  - $ref: training.pretraining.fabric.schema.yaml

properties:
  strategy:
    type: string
    enum: [dp]
    default: dp
    description: DataParallel strategy from fabric
  
  # DataParallel-specific configurations
  dp:
    type: object
    properties:
      sync_batch_norm:
        type: boolean
        default: false
        description: Whether to use synchronized batch normalization
      
      find_unused_parameters:
        type: boolean
        default: false
        description: Whether to find unused parameters
      
      broadcast_buffers:
        type: boolean
        default: true
        description: Whether to broadcast buffers
      
      bucket_cap_mb:
        type: number
        default: 25
        description: Bucket capacity in MB
    additionalProperties: false

additionalProperties: false
