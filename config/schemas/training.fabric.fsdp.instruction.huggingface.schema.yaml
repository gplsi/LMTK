$schema: http://json-schema.org/draft-07/schema#
$id: training.fabric.fsdp.instruction.huggingface.schema.yaml
title: HuggingFace Dataset Configuration for Instruction Fine-tuning with FSDP
description: Schema for HuggingFace dataset configuration in instruction fine-tuning tasks using Lightning Fabric with FSDP strategy

type: object
allOf:
  - $ref: training.fabric.fsdp.instruction.schema.yaml

properties:
  # Dataset type must be HuggingFace
  dataset:
    type: object
    properties:
      type:
        type: string
        enum: [huggingface]
        description: Must be huggingface for this schema
      
      # HuggingFace-specific dataset configuration
      name:
        type: string
        description: Name of the HuggingFace dataset
      
      config_name:
        type: string
        description: Configuration name of the HuggingFace dataset
      
      revision:
        type: string
        description: Dataset revision to use
      
      use_auth_token:
        type: boolean
        default: false
        description: Whether to use auth token for private datasets
      
      # Split configuration
      splits:
        type: object
        properties:
          train:
            type: string
            description: Training split name
          validation:
            type: string
            description: Validation split name
          test:
            type: string
            description: Test split name
        required:
          - train
        additionalProperties: false
        description: Dataset splits
      
      # Field configuration
      fields:
        type: object
        properties:
          instruction:
            type: string
            description: Field name containing the instruction
          input:
            type: string
            description: Field name containing the input
          output:
            type: string
            description: Field name containing the output/response
          system:
            type: string
            description: Field name containing the system prompt
        required:
          - instruction
          - output
        additionalProperties: false
        description: Field names in the HuggingFace dataset
      
      # Data processing
      streaming:
        type: boolean
        default: false
        description: Whether to stream the dataset (for large datasets)
      
      cache_dir:
        type: string
        description: Directory to cache the dataset
      
      # Filtering
      filter:
        type: object
        properties:
          min_length:
            type: integer
            minimum: 1
            description: Minimum sequence length for filtering
          max_length:
            type: integer
            minimum: 1
            description: Maximum sequence length for filtering
          column:
            type: string
            description: Column to filter by length
          custom_filter:
            type: string
            description: Custom filter function (Python code as string)
        additionalProperties: false
        description: Dataset filtering options
    required:
      - type
      - name
      - fields
    additionalProperties: false
    description: HuggingFace dataset configuration

additionalProperties: false
