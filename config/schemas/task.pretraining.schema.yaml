$schema: http://json-schema.org/draft-07/schema#
$id: task.pretraining.schema.yaml
title: Pretraining Task Configuration
description: Schema for pretraining task configuration

type: object
allOf:
  - $ref: training.schema.yaml

properties:
  # Task must be pretraining
  task:
    type: string
    enum: [pretraining]
    description: Task type, must be 'pretraining'
  
  # Pretraining-specific configurations
  dataset:
    type: object
    description: Dataset configuration for pretraining
    required:
      - source
      - nameOrPath
    properties:
      source:
        type: string
        enum: [local, huggingface]
        description: Source of the dataset (local or huggingface)
      
      nameOrPath:
        type: string
        description: Name of the dataset (for huggingface) or path (for local)
      
      format:
        type: string
        enum: [dataset, files]
        description: Format of the dataset (dataset or files)
        default: dataset
      
      split:
        type: string
        description: Split of the dataset to use (for huggingface)
        default: train
      
      streaming:
        type: boolean
        description: Whether to stream the dataset (for huggingface)
        default: false
      
      file_config:
        type: object
        description: Configuration for file-based datasets
        properties:
          extension:
            type: string
            description: File extension to filter by
          recursive:
            type: boolean
            default: true
            description: Whether to search recursively
        additionalProperties: false
    additionalProperties: false
  
  # Model configuration
  model:
    type: object
    description: Model configuration for pretraining
    required:
      - name_or_path
    properties:
      name_or_path:
        type: string
        description: Name or path of the model to use
      
      config_name_or_path:
        type: string
        description: Name or path of the model config to use
      
      dtype:
        type: string
        enum: [float32, float16, bfloat16]
        default: bfloat16
        description: Data type for model parameters
      
      trust_remote_code:
        type: boolean
        default: false
        description: Whether to trust remote code when loading models
      
      use_auth_token:
        type: boolean
        default: false
        description: Whether to use auth token when loading models
    additionalProperties: false
  
  # Tokenizer configuration
  tokenizer:
    type: object
    description: Tokenizer configuration for pretraining
    properties:
      name_or_path:
        type: string
        description: Name or path of the tokenizer to use
      
      use_fast:
        type: boolean
        default: true
        description: Whether to use fast tokenizer implementation
      
      padding_side:
        type: string
        enum: [left, right]
        default: right
        description: Padding side for tokenizer
      
      truncation_side:
        type: string
        enum: [left, right]
        default: right
        description: Truncation side for tokenizer
    additionalProperties: false
  
  # Data processing configuration
  data_processing:
    type: object
    description: Data processing configuration for pretraining
    properties:
      max_length:
        type: integer
        minimum: 1
        description: Maximum sequence length
      
      chunk_size:
        type: integer
        minimum: 1
        description: Chunk size for processing
      
      batch_size:
        type: integer
        minimum: 1
        description: Batch size for training
      
      num_workers:
        type: integer
        minimum: 0
        default: 4
        description: Number of workers for data loading
      
      shuffle:
        type: boolean
        default: true
        description: Whether to shuffle the dataset
      
      drop_last:
        type: boolean
        default: false
        description: Whether to drop the last incomplete batch
    additionalProperties: false

required:
  - dataset
  - model

additionalProperties: false
