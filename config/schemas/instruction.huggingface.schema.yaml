$schema: "http://json-schema.org/draft-07/schema#"
$id: "instruction.huggingface.schema.yaml"
description: "Schema for HuggingFace dataset configuration in instruction tasks"

type: object
properties:
  source:
    type: string
    enum: ["huggingface"]
    description: "Specifies that the dataset source is HuggingFace"
  
  nameOrPath:
    type: string
    description: "HuggingFace dataset name or path (e.g., 'tatsu-lab/alpaca')"
  
  split:
    type: string
    description: "Single dataset split to use (e.g., 'train', 'validation', 'test') - use this or 'splits', not both"
  
  splits:
    type: object
    description: "Configuration for specific dataset splits"
    properties:
      train:
        type: string
        default: "train"
        description: "Name of the training split in the dataset"
      validation:
        type: string
        description: "Name of the validation split in the dataset"
      test:
        type: string
        description: "Name of the test split in the dataset"
      use_all_splits:
        type: boolean
        default: false
        description: "Whether to use all available splits in the dataset"
  
  subset:
    type: string
    description: "Optional dataset subset name"
  
  streaming:
    type: boolean
    default: false
    description: "Whether to stream the dataset or load it entirely into memory"
  
  max_samples:
    type: object
    description: "Maximum number of samples to load per split"
    properties:
      train:
        type: integer
        description: "Maximum number of samples to load from the training split"
      validation:
        type: integer
        description: "Maximum number of samples to load from the validation split"
      test:
        type: integer
        description: "Maximum number of samples to load from the test split"
      all:
        type: integer
        description: "Maximum number of samples to load from any split if not specified individually"
  
  cache_dir:
    type: string
    description: "Directory to cache the downloaded dataset"
  
  use_auth_token:
    type: boolean
    default: false
    description: "Whether to use the HuggingFace auth token for accessing private datasets"
  
  revision:
    type: string
    default: "main"
    description: "Git revision of the dataset to load"
  
  auto_split:
    type: boolean
    default: false
    description: "Whether to automatically split the dataset if no validation/test splits are provided"

required:
  - source
  - nameOrPath
