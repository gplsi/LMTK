# Schema for pretraining with FSDP using HuggingFace datasets
# This schema extends the base pretraining FSDP schema

$schema: http://json-schema.org/draft-07/schema#
title: Pretraining FSDP HuggingFace Configuration
description: Configuration schema for pretraining with FSDP using HuggingFace datasets
type: object

allOf:
  - $ref: training.fabric.fsdp.pretraining.schema.yaml
  - type: object
    properties:
      dataset:
        type: object
        description: Dataset configuration for pretraining with HuggingFace
        required:
          - source
          - nameOrPath
        properties:
          source:
            type: string
            enum: [huggingface]
            description: Source of the dataset, must be 'huggingface'
          
          nameOrPath:
            type: string
            description: Name of the HuggingFace dataset
          
          config_name:
            type: string
            description: Configuration name for the HuggingFace dataset
          
          split:
            type: string
            description: Split of the dataset to use
            default: train
          
          streaming:
            type: boolean
            description: Whether to stream the dataset
            default: true
          
          cache_dir:
            type: string
            description: Directory to cache the dataset
            default: .cache
          
          use_auth_token:
            type: boolean
            description: Whether to use the HuggingFace auth token for private datasets
            default: false
          
          revision:
            type: string
            description: Revision of the dataset to use
            default: main
          
          filter:
            type: object
            description: Filtering options for the dataset
            properties:
              min_length:
                type: integer
                description: Minimum sequence length
                default: 10
              
              max_length:
                type: integer
                description: Maximum sequence length
                default: 2048
              
              column:
                type: string
                description: Column to filter on
                default: text
          
          preprocessing:
            type: object
            description: Preprocessing options for the dataset
            properties:
              text_column:
                type: string
                description: Column containing the text to preprocess
                default: text
              
              chunk_size:
                type: integer
                description: Size of text chunks for preprocessing
                default: 2048
              
              stride:
                type: integer
                description: Stride for text chunking
                default: 512
              
              add_eos_token:
                type: boolean
                description: Whether to add EOS token to each chunk
                default: true
