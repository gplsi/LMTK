# Schema for pretraining with FSDP
# This schema extends the base FSDP training schema

$schema: http://json-schema.org/draft-07/schema#
title: Pretraining FSDP Configuration
description: Configuration schema for pretraining with FSDP
type: object

allOf:
  - $ref: training.fabric.fsdp.schema.yaml
  - type: object
    properties:
      task:
        type: string
        enum: [pretraining]
        description: Task type, must be 'pretraining'
      
      dataset:
        type: object
        description: Dataset configuration for pretraining
        required:
          - source
          - nameOrPath
        properties:
          source:
            type: string
            enum: [local, huggingface]
            description: Source of the dataset (local or huggingface)
          
          nameOrPath:
            type: string
            description: Name of the dataset (for huggingface) or path (for local)
          
          format:
            type: string
            enum: [dataset, files]
            description: Format of the dataset (dataset or files)
            default: dataset
          
          split:
            type: string
            description: Split of the dataset to use (for huggingface)
            default: train
          
          streaming:
            type: boolean
            description: Whether to stream the dataset (for huggingface)
            default: false
          
          file_config:
            type: object
            description: Configuration for file-based datasets
            properties:
              extension:
                type: string
                description: File extension to filter
                default: .txt
              
              recursive:
                type: boolean
                description: Whether to search recursively
                default: true
              
              min_file_size:
                type: integer
                description: Minimum file size in bytes
                default: 0
              
              max_file_size:
                type: integer
                description: Maximum file size in bytes
                default: 1000000000  # 1GB
          
          filter:
            type: object
            description: Filtering options for the dataset
            properties:
              min_length:
                type: integer
                description: Minimum sequence length
                default: 10
              
              max_length:
                type: integer
                description: Maximum sequence length
                default: 2048
              
              column:
                type: string
                description: Column to filter on
                default: text
      
      training:
        type: object
        description: Training configuration
        properties:
          batch_size:
            type: integer
            description: Batch size per device
            default: 4
          
          gradient_accumulation_steps:
            type: integer
            description: Number of gradient accumulation steps
            default: 1
          
          gradient_checkpointing:
            type: boolean
            description: Whether to use gradient checkpointing
            default: false
          
          max_steps:
            type: integer
            description: Maximum number of training steps
            default: -1  # -1 means train for max_epochs
      
      preprocess_dataset:
        type: boolean
        description: Whether to preprocess the dataset before training
        default: true
      
      output:
        type: object
        description: Output configuration
        properties:
          save_processed:
            type: boolean
            description: Whether to save the processed dataset
            default: false
          
          path:
            type: string
            description: Path to save the processed dataset
            default: processed_dataset
