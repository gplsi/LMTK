$schema: http://json-schema.org/draft-07/schema#
$id: strategy.fsdp.schema.yaml
title: FSDP Strategy Configuration
description: Schema for Fully Sharded Data Parallel strategy configuration

type: object
allOf:
  - $ref: framework.fabric.schema.yaml

properties:
  # Strategy must be fsdp
  strategy:
    type: string
    enum: [fsdp]
    default: fsdp
    description: Strategy type, must be 'fsdp'
  
  # FSDP-specific configurations
  fsdp:
    type: object
    properties:
      sharding_strategy:
        type: string
        enum: [full_shard, shard_grad_op, no_shard]
        default: full_shard
        description: FSDP sharding strategy (1=full_shard, 2=shard_grad_op, 3=no_shard)
      
      auto_wrap_policy:
        type: string
        enum: [size_based, transformer]
        default: transformer
        description: FSDP auto wrap policy
      
      min_params:
        type: number
        minimum: 1
        default: 1.0e8
        description: Minimum number of parameters for size-based auto wrap policy
      
      transformer_layers:
        type: array
        items:
          type: string
        default: ["GPTJBlock", "LlamaDecoderLayer", "OPTDecoderLayer", "BloomBlock"]
        description: Transformer layer class names for transformer auto wrap policy
      
      activation_checkpointing:
        type: boolean
        default: true
        description: Whether to use activation checkpointing
      
      activation_checkpointing_policy:
        type: string
        enum: [module_name, module_type]
        default: module_type
        description: Policy for activation checkpointing
      
      activation_checkpointing_modules:
        type: array
        items:
          type: string
        default: ["GPTJBlock", "LlamaDecoderLayer", "OPTDecoderLayer", "BloomBlock"]
        description: Module names/types for activation checkpointing
      
      cpu_offload:
        type: boolean
        default: false
        description: Whether to offload parameters to CPU
      
      state_dict_type:
        type: string
        enum: [full, sharded, local]
        default: full
        description: Type of state dict to save/load
      
      limit_all_gathers:
        type: boolean
        default: true
        description: Whether to limit all-gathers
      
      sync_module_states:
        type: boolean
        default: true
        description: Whether to sync module states
      
      backward_prefetch:
        type: string
        enum: [none, backward, backward_pre]
        default: backward_pre
        description: Backward prefetch strategy
      
      forward_prefetch:
        type: boolean
        default: false
        description: Whether to prefetch in forward pass
      
      use_orig_params:
        type: boolean
        default: true
        description: Whether to use original parameters
    required:
      - sharding_strategy
    additionalProperties: false

additionalProperties: false
