# FSDP Pretraining Configuration for GPT2 on a 16GB GPU

# Required base properties
task: pretraining
experiment_name: gpt2_pretraining_fsdp
output_dir: /tmp/pretraining_output

# Framework configuration
framework: fabric

# Strategy configuration
strategy: fsdp

# Required dataset properties for pretraining
dataset:
  source: huggingface
  nameOrPath: wikitext
  format: dataset
  split: train

# Required model properties for pretraining
model:
  name_or_path: gpt2

# FSDP-specific configuration
fsdp:
  sharding_strategy: full_shard
  auto_wrap_policy: transformer
  activation_checkpointing: true
  cpu_offload: false

# Training configuration
devices: 1
precision: bf16-mixed
max_epochs: 3

# Optimizer configuration
optimizer:
  name: adamw
  learning_rate: 5.0e-5
  weight_decay: 0.01

# Scheduler configuration
scheduler:
  name: cosine
  warmup_steps: 100
