# FSDP Instruction Fine-tuning Configuration for GPT2 on a 16GB GPU

# Required base properties
task: instruction
experiment_name: gpt2_instruction_fsdp
output_dir: /tmp/instruction_output

# Framework configuration
framework: fabric

# Strategy configuration
strategy: fsdp

# Required dataset properties for instruction fine-tuning
dataset:
  source: huggingface
  nameOrPath: tatsu-lab/alpaca
  format: dataset
  split: train
  streaming: false

# Required model properties for instruction fine-tuning
model:
  name_or_path: gpt2

# FSDP-specific configuration
fsdp:
  sharding_strategy: full_shard
  auto_wrap_policy: transformer
  activation_checkpointing: true
  cpu_offload: false

# Training configuration
devices: 1
precision: bf16-mixed
max_epochs: 3

# Optimizer configuration
optimizer:
  name: adamw
  learning_rate: 2.0e-5  # Lower learning rate for fine-tuning
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Scheduler configuration
scheduler:
  name: cosine
  warmup_steps: 50  # Fewer warmup steps for fine-tuning

